<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke Roulette 🎤</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a1a; --surface: #12122a; --card: #1a1a35;
    --neon-pink: #ff2d78; --neon-cyan: #00f5ff; --neon-yellow: #ffe600;
    --neon-purple: #bf5fff; --text: #f0f0ff; --text-dim: #7878aa;
    --border: rgba(0,245,255,0.18);
    --glow-pink: 0 0 20px rgba(255,45,120,0.6), 0 0 60px rgba(255,45,120,0.2);
    --glow-cyan: 0 0 20px rgba(0,245,255,0.6), 0 0 60px rgba(0,245,255,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-family: 'Russo One', sans-serif; font-size: 2.5rem; background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 500px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  .option-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .option-btn { background: transparent; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; color: white; cursor: pointer; text-align: left; }
  .option-btn.selected { border-color: var(--neon-pink); background: rgba(255,45,120,0.1); }
  .neon-input { width: 100%; background: #0a0a1a; border: 1.5px solid var(--neon-cyan); border-radius: 10px; padding: 12px; color: white; margin-bottom: 10px; }
  .btn { padding: 12px; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; width: 100%; margin-top: 5px; }
  .btn-primary { background: var(--neon-pink); color: white; }
  .btn-secondary { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); }
  .hidden { display: none !important; }
  .search-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header"><h1>KARAOKE ROULETTE</h1></div>

<div class="card" id="step-input">
  <div class="option-grid">
    <button class="option-btn selected" id="opt1" onclick="selectOption(1)">1. Song</button>
    <button class="option-btn" id="opt2" onclick="selectOption(2)">2. Artist/Band</button>
  </div>
  <input class="neon-input" id="search-input" type="text" placeholder="Search..." />
  <button class="btn btn-primary" onclick="startSearch()">Search</button>
  <div id="step1-error" style="color:var(--neon-pink); margin-top:10px;"></div>
</div>

<div class="card hidden" id="step-confirm">
  <img id="confirm-img" style="width:100%; border-radius:8px;" src="" />
  <h3 id="confirm-title" style="margin:15px 0;"></h3>
  <div class="thumb-actions" style="display:flex; gap:10px;">
    <button class="btn btn-primary" onclick="confirmSelection()">Yes</button>
    <button class="btn btn-secondary" onclick="tryAnother()">No</button>
  </div>
</div>

<div class="card hidden" id="step-result">
  <h2 id="result-title"></h2>
  <a id="result-link" href="#" target="_blank" class="btn btn-primary" style="margin-top:20px; display:block; text-decoration:none; text-align:center;">Open on YouTube</a>
  <button class="btn btn-secondary" onclick="playAgain()" style="margin-top:10px;">Spin Again</button>
</div>

<script>
let selectedOption = 1;
let searchResults = [];
let currentResultIndex = 0;
let confirmedVideo = null;

function selectOption(n) { 
  selectedOption = n; 
  document.getElementById('opt1').classList.toggle('selected', n === 1);
  document.getElementById('opt2').classList.toggle('selected', n === 2);
}

function showStep(id) { 
  ['step-input','step-confirm','step-result'].forEach(s => document.getElementById(s).classList.toggle('hidden', s !== id)); 
}

function setError(id, msg) { document.getElementById(id).textContent = msg; }

async function callClaudeJSON(prompt) {
  const resp = await fetch("/api/karaoke-agent", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt, systemPrompt: "Return only raw JSON array of up to 3 objects with {videoId, title, channelName}." })
  });
  const data = await resp.json();
  const rawText = typeof data.text === 'string' ? data.text : JSON.stringify(data.text);
  const match = rawText.match(/\[[\s\S]*\]/);
  return match ? JSON.parse(match[0]) : [];
}

async function startSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  const btn = document.querySelector('#step-input .btn-primary');
  btn.disabled = true; btn.innerHTML = '<span class="search-spinner"></span>Searching...';
  
  try {
    const typeLabel = selectedOption === 1 ? 'song' : 'artist/band';
    // Optimized prompt for speed: simple and direct
    const prompt = `Search YouTube for: "${query}". Return a JSON array of 3 results with {videoId, title, channelName}.`;
    searchResults = await callClaudeJSON(prompt);
    currentResultIndex = 0;
    showConfirm();
  } catch(e) {
    setError('step1-error', 'Search failed. Try again.');
  } finally {
    btn.disabled = false; btn.innerHTML = 'Search';
  }
}

function showConfirm() {
  const v = searchResults[currentResultIndex];
  document.getElementById('confirm-img').src = `https://img.youtube.com/vi/${v.videoId}/hqdefault.jpg`;
  document.getElementById('confirm-title').textContent = v.title;
  showStep('step-confirm');
}

function confirmSelection() {
  confirmedVideo = searchResults[currentResultIndex];
  showStep('step-result');
  document.getElementById('result-title').textContent = "Sing this: " + confirmedVideo.title;
  document.getElementById('result-link').href = `https://www.youtube.com/watch?v=${confirmedVideo.videoId}`;
}

function tryAnother() {
  currentResultIndex++;
  if (currentResultIndex < searchResults.length) showConfirm();
  else { alert('No more results!'); playAgain(); }
}

function playAgain() { 
  searchResults = [];
  showStep('step-input'); 
}
</script>
</body>
</html>
